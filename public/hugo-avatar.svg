<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background circle -->
  <circle cx="100" cy="100" r="100" fill="#141414"/>

  <!-- Gradient definition -->
  <defs>
    <linearGradient id="goldGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#d4b05a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b8973a;stop-opacity:1" />
    </linearGradient>

    <linearGradient id="glowGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#b8973a;stop-opacity:0.3" />
      <stop offset="100%" style="stop-color:#b8973a;stop-opacity:0" />
    </linearGradient>
  </defs>

  <!-- Outer glow -->
  <circle cx="100" cy="100" r="90" fill="url(#glowGradient)" opacity="0.4"/>

  <!-- Chat bubble main -->
  <path d="M 60 65 L 140 65 Q 150 65 150 75 L 150 115 Q 150 125 140 125 L 110 125 L 100 140 L 90 125 L 60 125 Q 50 125 50 115 L 50 75 Q 50 65 60 65 Z"
        fill="url(#goldGradient)"
        opacity="0.9"/>

  <!-- Building grid pattern inside bubble (represents architecture/real estate) -->
  <g opacity="0.4">
    <!-- Vertical lines -->
    <line x1="70" y1="75" x2="70" y2="115" stroke="#141414" stroke-width="1.5"/>
    <line x1="85" y1="75" x2="85" y2="115" stroke="#141414" stroke-width="1.5"/>
    <line x1="100" y1="75" x2="100" y2="115" stroke="#141414" stroke-width="1.5"/>
    <line x1="115" y1="75" x2="115" y2="115" stroke="#141414" stroke-width="1.5"/>
    <line x1="130" y1="75" x2="130" y2="115" stroke="#141414" stroke-width="1.5"/>

    <!-- Horizontal lines -->
    <line x1="60" y1="85" x2="140" y2="85" stroke="#141414" stroke-width="1.5"/>
    <line x1="60" y1="100" x2="140" y2="100" stroke="#141414" stroke-width="1.5"/>
  </g>

  <!-- AI spark (top right of bubble) -->
  <g transform="translate(135, 70)">
    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#f4f0e8"/>

    <!-- Sparkle rays -->
    <line x1="0" y1="-8" x2="0" y2="-12" stroke="#f4f0e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="0" x2="12" y2="0" stroke="#f4f0e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="-8" y1="0" x2="-12" y2="0" stroke="#f4f0e8" stroke-width="2" stroke-linecap="round"/>
    <line x1="0" y1="8" x2="0" y2="12" stroke="#f4f0e8" stroke-width="2" stroke-linecap="round"/>

    <line x1="6" y1="-6" x2="9" y2="-9" stroke="#f4f0e8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="6" y1="6" x2="9" y2="9" stroke="#f4f0e8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="-6" x2="-9" y2="-9" stroke="#f4f0e8" stroke-width="1.5" stroke-linecap="round"/>
    <line x1="-6" y1="6" x2="-9" y2="9" stroke="#f4f0e8" stroke-width="1.5" stroke-linecap="round"/>
  </g>

  <!-- "H" letter (for Hugo) inside bubble -->
  <text x="100" y="105"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="32"
        font-weight="700"
        fill="#141414"
        text-anchor="middle"
        dominant-baseline="middle"
        opacity="0.8">H</text>
</svg>