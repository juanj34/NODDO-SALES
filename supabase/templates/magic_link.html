<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu link de acceso — NODDO</title>
</head>
<body style="margin:0;padding:0;background-color:#0a0a0a;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;-webkit-font-smoothing:antialiased;">
  <table width="100%" cellpadding="0" cellspacing="0" border="0" style="background-color:#0a0a0a;padding:40px 20px;">
    <tr>
      <td align="center">
        <table width="480" cellpadding="0" cellspacing="0" border="0" style="background-color:#141414;border:1px solid #222222;border-radius:16px;overflow:hidden;max-width:480px;width:100%;">
          <!-- Gold accent bar -->
          <tr>
            <td style="height:3px;background-color:#b8973a;font-size:0;line-height:0;">&nbsp;</td>
          </tr>

          <!-- Logo -->
          <tr>
            <td align="center" style="padding:40px 40px 8px;">
              <span style="font-family:Georgia,'Times New Roman',serif;font-size:26px;letter-spacing:0.15em;font-weight:300;">
                <span style="color:#f4f0e8;">NOD</span><span style="color:#b8973a;">DO</span>
              </span>
            </td>
          </tr>

          <!-- Heading -->
          <tr>
            <td align="center" style="padding:16px 40px 8px;">
              <h1 style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:22px;font-weight:300;color:#f4f0e8;letter-spacing:0.02em;">
                Tu link de acceso
              </h1>
            </td>
          </tr>

          <!-- Body text -->
          <tr>
            <td style="padding:12px 40px 28px;">
              <p style="margin:0;font-size:13px;line-height:1.7;color:#9a9590;text-align:center;">
                Haz clic en el boton de abajo para iniciar sesion en tu cuenta de NODDO. Este enlace es de uso unico y expirara en una hora.
              </p>
            </td>
          </tr>

          <!-- CTA Button -->
          <tr>
            <td align="center" style="padding:0 40px 32px;">
              <table cellpadding="0" cellspacing="0" border="0">
                <tr>
                  <td align="center" style="background-color:#b8973a;border-radius:8px;">
                    <a href="{{ .ConfirmationURL }}" target="_blank" style="display:inline-block;padding:14px 40px;font-family:'Helvetica Neue',Helvetica,Arial,sans-serif;font-size:11px;font-weight:800;letter-spacing:0.15em;text-transform:uppercase;color:#141414;text-decoration:none;">
                      Iniciar Sesion
                    </a>
                  </td>
                </tr>
              </table>
            </td>
          </tr>

          <!-- Muted note -->
          <tr>
            <td style="padding:0 40px 32px;">
              <p style="margin:0;font-size:11px;line-height:1.6;color:#5a5550;text-align:center;">
                Si no solicitaste este enlace, puedes ignorar este mensaje.
              </p>
            </td>
          </tr>

          <!-- Divider -->
          <tr>
            <td style="padding:0 40px;">
              <div style="height:1px;background-color:#222222;"></div>
            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td style="padding:24px 40px 32px;">
              <p style="margin:0;font-size:11px;color:#3a3530;text-align:center;line-height:1.6;">
                Micrositios premium para desarrolladores inmobiliarios
                <br>
                <a href="{{ .SiteURL }}" style="color:#b8973a;text-decoration:none;">noddo.co</a>
              </p>
            </td>
          </tr>
        </table>
      </td>
    </tr>
  </table>
</body>
</html>
